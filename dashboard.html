function CalculatorTab() {
  const [monthlyBudget, setMonthlyBudget] = useState(1000);
  const [avgMultiplier, setAvgMultiplier] = useState(3.0);
  const [allocMode, setAllocMode] = useState("equal");
  const [customWeights, setCustomWeights] = useState(
    Object.fromEntries(CALC_ASSETS.map(a => [a.ticker, 1]))
  );
  const [worstCaseAssets, setWorstCaseAssets] = useState(4);
  const [worstCaseMult, setWorstCaseMult] = useState(4);

  const safeDailyBudget = monthlyBudget / (30 * avgMultiplier);

  const analysis = useMemo(() => {
    const totalWeight = allocMode === "equal"
      ? CALC_ASSETS.length
      : Object.values(customWeights).reduce((a, b) => a + b, 0);

    return CALC_ASSETS.map(asset => {
      const weight = allocMode === "equal" ? 1 : (customWeights[asset.ticker] || 1);
      const dailyAlloc = (weight / totalWeight) * safeDailyBudget;
      const avgDaysBetween = 365 / asset.avgTradesPerYear;
      const accumulatedAtFire = dailyAlloc * avgDaysBetween;
      const avgBuySize = accumulatedAtFire * avgMultiplier;
      const maxBuySize = accumulatedAtFire * CALC_MAX_MULT;
      const monthlyTradesEst = asset.avgTradesPerYear / 12;
      const monthlySpendEst = monthlyTradesEst * avgBuySize;
      return { ...asset, weight, dailyAlloc, avgDaysBetween, accumulatedAtFire, avgBuySize, maxBuySize, monthlyTradesEst, monthlySpendEst };
    });
  }, [monthlyBudget, avgMultiplier, allocMode, customWeights, safeDailyBudget]);

  const totalMonthlySpend = analysis.reduce((s, a) => s + a.monthlySpendEst, 0);
  const setWeight = (ticker, val) => setCustomWeights(prev => ({ ...prev, [ticker]: Math.max(0, val) }));

  return (
    <div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(240px, 1fr))', gap: '1rem', marginBottom: '1.75rem' }}>
        <div className="card">
          <div className="card-title" style={{ marginBottom: '0.85rem' }}>Monthly Budget</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
            <span style={{ color: 'var(--gold)', fontSize: '2rem', fontWeight: 700 }}>$</span>
            <input type="number" value={monthlyBudget}
              onChange={e => setMonthlyBudget(Math.max(0, +e.target.value))}
              style={{ fontSize: '2rem', width: '160px', fontWeight: 700, background: 'var(--bg-deep)', border: '1px solid var(--border)', color: 'var(--gold)', padding: '8px 12px', borderRadius: '8px', fontFamily: 'inherit' }} />
          </div>
          <div style={{ display: 'flex', gap: '0.5rem', marginTop: '0.85rem', flexWrap: 'wrap' }}>
            {[500, 1000, 2500, 5000, 10000].map(v => (
              <button key={v} onClick={() => setMonthlyBudget(v)} style={{
                background: monthlyBudget === v ? 'var(--gold)' : 'var(--bg-deep)',
                color: monthlyBudget === v ? 'var(--bg-deep)' : 'var(--text-muted)',
                border: '1px solid var(--border)', borderRadius: '6px', padding: '4px 10px',
                fontSize: '0.78rem', cursor: 'pointer', fontFamily: 'inherit', fontWeight: 600
              }}>${v >= 1000 ? `${v/1000}k` : v}</button>
            ))}
          </div>
        </div>

        <div className="card">
          <div className="card-title" style={{ marginBottom: '0.85rem' }}>Expected Avg Multiplier</div>
          <div style={{ color: 'var(--gold-bright)', fontSize: '2rem', fontWeight: 700, marginBottom: '0.6rem' }}>{avgMultiplier.toFixed(1)}x</div>
          <input type="range" min={1} max={5} step={0.1} value={avgMultiplier}
            onChange={e => setAvgMultiplier(+e.target.value)}
            style={{ width: '100%', accentColor: 'var(--gold)' }} />
          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.75rem', color: 'var(--text-muted)', marginTop: '6px' }}>
            <span>1x conservative</span><span>5x max</span>
          </div>
        </div>

        <div className="card" style={{ background: 'rgba(22,101,52,0.15)', borderColor: 'var(--green-dim)' }}>
          <div className="card-title" style={{ marginBottom: '0.85rem', color: 'var(--green)' }}>Safe Daily Allocation</div>
          <div style={{ color: 'var(--green)', fontSize: '2rem', fontWeight: 700 }}>
            ${calcFmt(safeDailyBudget)}<span style={{ fontSize: '0.92rem', color: 'var(--green-dim)' }}>/day</span>
          </div>
          <div style={{ fontSize: '0.85rem', color: 'var(--green-dim)', marginTop: '0.5rem' }}>
            ${calcFmt(safeDailyBudget / CALC_ASSETS.length)}/day per asset
          </div>
          <div style={{ marginTop: '0.85rem', padding: '0.6rem', borderRadius: '6px', background: 'rgba(0,0,0,0.2)', fontSize: '0.82rem', color: 'var(--green-dim)', lineHeight: 1.65 }}>
            ${calcFmt(monthlyBudget,0)} {'\u00F7'} (30 {'\u00D7'} {avgMultiplier.toFixed(1)}x) = ${calcFmt(safeDailyBudget)}/day
          </div>
        </div>
      </div>

      {/* Budget Utilization Bar */}
      <div className="card" style={{ marginBottom: '1.5rem' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.6rem' }}>
          <span className="card-title">Monthly Budget Utilization</span>
          <span style={{ fontSize: '0.92rem', fontWeight: 700, color: 'var(--green)' }}>
            ${calcFmt(totalMonthlySpend, 0)} / ${calcFmt(monthlyBudget, 0)}
          </span>
        </div>
        <div style={{ background: 'var(--bg-deep)', borderRadius: '4px', height: '8px', overflow: 'hidden' }}>
          <div style={{
            width: `${Math.min(100, (totalMonthlySpend / monthlyBudget) * 100)}%`,
            height: '100%', borderRadius: '4px',
            background: totalMonthlySpend > monthlyBudget * 1.05 ? 'var(--red)' : 'var(--green)',
            transition: 'width 0.3s'
          }} />
        </div>
      </div>

      {/* Allocation Mode Toggle */}
      <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '1.25rem' }}>
        {["equal", "custom"].map(mode => (
          <button key={mode} onClick={() => setAllocMode(mode)} style={{
            background: allocMode === mode ? 'var(--gold)' : 'var(--bg-deep)',
            color: allocMode === mode ? 'var(--bg-deep)' : 'var(--text-muted)',
            border: '1px solid var(--border)', borderRadius: '6px', padding: '0.5rem 1.25rem',
            fontSize: '0.88rem', cursor: 'pointer', fontFamily: 'inherit', fontWeight: 600
          }}>
            {mode === "equal" ? "Equal Split" : "Custom Weights"}
          </button>
        ))}
      </div>

      {/* Per-Asset Breakdown Table */}
      <div className="card" style={{ overflowX: 'auto', marginBottom: '1.5rem' }}>
        <table className="signal-table" style={{ fontSize: '0.85rem' }}>
          <thead><tr>
            {["Asset", ...(allocMode === "custom" ? ["Wt"] : []), "Daily $", "Avg Gap", "Accumulated", `Avg Buy (${avgMultiplier.toFixed(1)}x)`, "Max Buy (5x)", "Trades/mo", "Spend/mo"].map(h => (
              <th key={h} style={{ textAlign: h === "Asset" ? "left" : "right", whiteSpace: 'nowrap' }}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {analysis.map((a, i) => (
              <tr key={a.ticker}>
                <td><span style={{ color: 'var(--gold)', fontWeight: 700 }}>{a.ticker}</span><span style={{ color: 'var(--text-muted)', fontSize: '0.75rem', marginLeft: '0.5rem' }}>{a.type}</span></td>
                {allocMode === "custom" && <td style={{ textAlign: 'right' }}>
                  <input type="number" value={a.weight} min={0} max={10} step={0.5}
                    onChange={e => setWeight(a.ticker, +e.target.value)}
                    style={{ width: '52px', fontSize: '0.82rem', background: 'var(--bg-deep)', border: '1px solid var(--border)', color: 'var(--gold)', padding: '4px 6px', borderRadius: '4px', fontFamily: 'inherit', textAlign: 'right' }} />
                </td>}
                <td style={{ textAlign: 'right', color: 'var(--green)' }}>${calcFmt(a.dailyAlloc)}</td>
                <td style={{ textAlign: 'right', color: 'var(--text-muted)' }}>{calcFmt(a.avgDaysBetween, 1)}d</td>
                <td style={{ textAlign: 'right' }}>${calcFmt(a.accumulatedAtFire)}</td>
                <td style={{ textAlign: 'right', color: 'var(--green)', fontWeight: 600 }}>${calcFmt(a.avgBuySize)}</td>
                <td style={{ textAlign: 'right', color: 'var(--gold-bright)' }}>${calcFmt(a.maxBuySize)}</td>
                <td style={{ textAlign: 'right', color: 'var(--text-muted)' }}>{calcFmt(a.monthlyTradesEst, 1)}</td>
                <td style={{ textAlign: 'right', fontWeight: 600 }}>${calcFmt(a.monthlySpendEst, 0)}</td>
              </tr>
            ))}
          </tbody>
          <tfoot><tr style={{ borderTop: '2px solid var(--border)' }}>
            <td colSpan={allocMode === "custom" ? 2 : 1} style={{ fontWeight: 700, color: 'var(--gold)' }}>TOTAL</td>
            <td style={{ textAlign: 'right', fontWeight: 700, color: 'var(--green)' }}>${calcFmt(safeDailyBudget)}</td>
            <td></td><td></td><td></td><td></td>
            <td style={{ textAlign: 'right', fontWeight: 700, color: 'var(--text-muted)' }}>{calcFmt(analysis.reduce((s, a) => s + a.monthlyTradesEst, 0), 0)}</td>
            <td style={{ textAlign: 'right', fontWeight: 700, color: 'var(--green)' }}>${calcFmt(totalMonthlySpend, 0)}</td>
          </tr></tfoot>
        </table>
      </div>

      {/* Crash Day Scenario */}
      <div className="card" style={{ marginBottom: '1.5rem' }}>
        <div className="card-title" style={{ marginBottom: '1rem' }}>Crash Day Scenario</div>
        <div style={{ display: 'flex', gap: '1.5rem', alignItems: 'center', flexWrap: 'wrap' }}>
          <div>
            <div style={{ fontSize: '0.82rem', color: 'var(--text-muted)', marginBottom: '0.3rem' }}>Assets firing same day</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
              <input type="range" min={1} max={14} value={worstCaseAssets}
                onChange={e => setWorstCaseAssets(+e.target.value)}
                style={{ width: '120px', accentColor: 'var(--gold)' }} />
              <span style={{ color: 'var(--gold)', fontWeight: 600, fontSize: '1rem' }}>{worstCaseAssets}</span>
            </div>
          </div>
          <div>
            <div style={{ fontSize: '0.82rem', color: 'var(--text-muted)', marginBottom: '0.3rem' }}>At multiplier</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
              <input type="range" min={1} max={5} step={0.5} value={worstCaseMult}
                onChange={e => setWorstCaseMult(+e.target.value)}
                style={{ width: '120px', accentColor: 'var(--gold)' }} />
              <span style={{ color: 'var(--gold)', fontWeight: 600, fontSize: '1rem' }}>{worstCaseMult}x</span>
            </div>
          </div>
          <div style={{ borderLeft: '1px solid var(--border)', paddingLeft: '1.5rem' }}>
            <div style={{ fontSize: '0.78rem', color: 'var(--text-muted)', marginBottom: '0.3rem', textTransform: 'uppercase', letterSpacing: '0.1em' }}>Cash needed</div>
            <div style={{ fontSize: '1.5rem', fontWeight: 700, color: 'var(--gold-bright)' }}>
              ${calcFmt(analysis.slice(0, worstCaseAssets).reduce((s, a) => s + a.accumulatedAtFire * worstCaseMult, 0), 0)}
            </div>
          </div>
          <div style={{ borderLeft: '1px solid var(--border)', paddingLeft: '1.5rem' }}>
            <div style={{ fontSize: '0.78rem', color: 'var(--text-muted)', marginBottom: '0.3rem', textTransform: 'uppercase', letterSpacing: '0.1em' }}>% of monthly budget</div>
            <div style={{ fontSize: '1.5rem', fontWeight: 700 }}>
              {calcFmt(analysis.slice(0, worstCaseAssets).reduce((s, a) => s + a.accumulatedAtFire * worstCaseMult, 0) / monthlyBudget * 100, 1)}%
            </div>
          </div>
        </div>
      </div>

      {/* The Math Explainer */}
      <div className="card" style={{ fontSize: '0.85rem', color: 'var(--text-secondary)', lineHeight: 1.8 }}>
        <span style={{ color: 'var(--gold)', fontWeight: 600 }}>The math: </span>
        If your avg multiplier is {avgMultiplier.toFixed(1)}x, every $1 you set aside becomes ${avgMultiplier.toFixed(1)} when deployed.
        So your safe daily rate is ${calcFmt(monthlyBudget,0)} {'\u00F7'} (30 {'\u00D7'} {avgMultiplier.toFixed(1)}) = <span style={{ color: 'var(--green)' }}>${calcFmt(safeDailyBudget)}/day</span> across all assets.
        At equal split that's ${calcFmt(safeDailyBudget / CALC_ASSETS.length)}/day/asset. Estimated total spend: ${calcFmt(totalMonthlySpend, 0)}/month.
      </div>
    </div>
  );
}

// ─── My Portfolio Tab (localStorage personal tracking) ──────
const MY_PF_KEY = 'soomario_my_portfolio';
const MY_PF_ASSETS = CALC_ASSETS.map(a => a.ticker);

function loadMyBuys() {
  try { return JSON.parse(localStorage.getItem(MY_PF_KEY) || '[]'); }
  catch { return []; }
}
function saveMyBuys(buys) { localStorage.setItem(MY_PF_KEY, JSON.stringify(buys)); }

function MyPortfolioTab() {
  const [myBuys, setMyBuys] = useState(loadMyBuys);
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ asset: 'BTC', amount: '', price: '', date: new Date().toISOString().slice(0,10), notes: '' });
  const [confirmDelete, setConfirmDelete] = useState(null);

  const addBuy = () => {
    if (!form.amount || !form.price) return;
    const entry = { ...form, id: Date.now(), amount: parseFloat(form.amount), price: parseFloat(form.price) };
    const updated = [entry, ...myBuys];
    setMyBuys(updated);
    saveMyBuys(updated);
    setForm({ asset: 'BTC', amount: '', price: '', date: new Date().toISOString().slice(0,10), notes: '' });
    setShowForm(false);
  };

  const deleteBuy = (id) => {
    const updated = myBuys.filter(b => b.id !== id);
    setMyBuys(updated);
    saveMyBuys(updated);
    setConfirmDelete(null);
  };

  const clearAll = () => {
    if (window.confirm('Clear all your portfolio entries? This cannot be undone.')) {
      setMyBuys([]);
      saveMyBuys([]);
    }
  };

  const assetSummary = {};
  myBuys.forEach(b => {
    if (!assetSummary[b.asset]) assetSummary[b.asset] = { totalInvested: 0, totalQty: 0, buys: 0 };
    const invested = b.amount * b.price;
    assetSummary[b.asset].totalInvested += invested;
    assetSummary[b.asset].totalQty += b.amount;
    assetSummary[b.asset].buys += 1;
  });

  const totalInvested = Object.values(assetSummary).reduce((s, a) => s + a.totalInvested, 0);
  const totalBuys = myBuys.length;
  const assetsHeld = Object.keys(assetSummary).length;

  return (
    <div>
      <div className="stats-grid">
        <StatCard title="Total Invested" value={`$${totalInvested.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`} label="Your logged buys" />
        <StatCard title="Total Buys" value={totalBuys} color="var(--green)" label="Manual entries" />
        <StatCard title="Assets Held" value={assetsHeld} color="var(--purple)" label={`of ${MY_PF_ASSETS.length} tracked`} />
        <StatCard title="Avg Buy Size" value={totalBuys > 0 ? `$${(totalInvested / totalBuys).toFixed(2)}` : '\u2014'} color="var(--blue)" label="Mean per entry" />
      </div>

      {assetsHeld > 0 && (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(210px, 1fr))', gap: '0.85rem', marginBottom: '1.5rem' }}>
          {Object.entries(assetSummary).sort((a,b) => b[1].totalInvested - a[1].totalInvested).map(([ticker, data]) => (
            <div key={ticker} className="card" style={{ padding: '1.15rem' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                <span style={{ color: 'var(--gold)', fontWeight: 700, fontFamily: "'Cinzel', serif", fontSize: '1.1rem' }}>{ticker}</span>
                <span style={{ fontSize: '0.78rem', color: 'var(--text-muted)' }}>{data.buys} buys</span>
              </div>
              <div style={{ color: 'var(--green)', fontWeight: 700, fontSize: '1.2rem' }}>${data.totalInvested.toFixed(2)}</div>
              <div style={{ fontSize: '0.82rem', color: 'var(--text-muted)', marginTop: '0.3rem' }}>
                Qty: {data.totalQty.toFixed(4)} · Avg: ${(data.totalInvested / data.totalQty).toFixed(2)}
              </div>
            </div>
          ))}
        </div>
      )}

      <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '1.25rem', alignItems: 'center' }}>
        <button onClick={() => setShowForm(!showForm)} style={{
          background: showForm ? 'var(--red-dim)' : 'linear-gradient(135deg, var(--gold-dim), var(--gold))',
          color: showForm ? 'var(--red)' : 'var(--bg-deep)',
          border: 'none', borderRadius: '8px', padding: '0.7rem 1.4rem',
          fontFamily: 'inherit', fontSize: '0.88rem', fontWeight: 600, cursor: 'pointer'
        }}>
          {showForm ? '\u2715 Cancel' : '+ Log a Buy'}
        </button>
        {myBuys.length > 0 && (
          <button onClick={clearAll} style={{
            background: 'none', border: '1px solid var(--border)', borderRadius: '8px',
            padding: '0.7rem 1.15rem', color: 'var(--text-muted)', fontFamily: 'inherit',
            fontSize: '0.82rem', cursor: 'pointer'
          }}>Clear All</button>
        )}
        <span style={{ fontSize: '0.78rem', color: 'var(--text-muted)', marginLeft: 'auto' }}>
          Stored in your browser · not synced to server
        </span>
      </div>

      {showForm && (
        <div className="card" style={{ marginBottom: '1.5rem', borderColor: 'var(--gold-dim)' }}>
          <div className="card-title" style={{ marginBottom: '1rem' }}>Log a Buy</div>
          <div className="calc-form">
            <div className="calc-field">
              <label>Asset</label>
              <select value={form.asset} onChange={e => setForm(f => ({...f, asset: e.target.value}))}>
                {MY_PF_ASSETS.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            </div>
            <div className="calc-field">
              <label>Quantity Bought</label>
              <input type="number" placeholder="e.g. 0.5" value={form.amount} step="any"
                onChange={e => setForm(f => ({...f, amount: e.target.value}))} />
            </div>
            <div className="calc-field">
              <label>Price Per Unit ($)</label>
              <input type="number" placeholder="e.g. 150.00" value={form.price} step="any"
                onChange={e => setForm(f => ({...f, price: e.target.value}))} />
            </div>
            <div className="calc-field">
              <label>Date</label>
              <input type="date" value={form.date}
                onChange={e => setForm(f => ({...f, date: e.target.value}))} />
            </div>
          </div>
          {form.amount && form.price && (
            <div style={{ fontSize: '0.88rem', color: 'var(--gold)', margin: '0.85rem 0 0.6rem', fontWeight: 600 }}>
              Total: ${(parseFloat(form.amount) * parseFloat(form.price)).toFixed(2)}
            </div>
          )}
          <button onClick={addBuy} disabled={!form.amount || !form.price} style={{
            background: (!form.amount || !form.price) ? 'var(--border)' : 'linear-gradient(135deg, var(--gold-dim), var(--gold))',
            color: 'var(--bg-deep)', border: 'none', borderRadius: '8px', padding: '0.7rem 2.25rem',
            fontFamily: 'inherit', fontSize: '0.92rem', fontWeight: 600,
            cursor: (!form.amount || !form.price) ? 'not-allowed' : 'pointer', marginTop: '0.5rem'
          }}>Add Entry</button>
        </div>
      )}

      <div className="card" style={{ overflowX: 'auto' }}>
        <div className="card-title" style={{ marginBottom: '1rem' }}>Buy History</div>
        <table className="signal-table">
          <thead><tr>
            <th>Date</th><th>Asset</th><th>Qty</th><th>Price</th><th>Total</th><th></th>
          </tr></thead>
          <tbody>
            {myBuys.length === 0 && (
              <tr><td colSpan="6" style={{ textAlign: 'center', padding: '2rem', color: 'var(--text-muted)' }}>
                No buys logged yet — click "Log a Buy" to start tracking your DCA entries.
              </td></tr>
            )}
            {myBuys.sort((a,b) => new Date(b.date) - new Date(a.date)).map((b) => (
              <tr key={b.id}>
                <td style={{ whiteSpace: 'nowrap' }}>{new Date(b.date).toLocaleDateString()}</td>
                <td style={{ color: 'var(--gold)', fontWeight: 600 }}>{b.asset}</td>
                <td>{b.amount}</td>
                <td>${b.price.toFixed(2)}</td>
                <td style={{ fontWeight: 600 }}>${(b.amount * b.price).toFixed(2)}</td>
                <td style={{ textAlign: 'right' }}>
                  {confirmDelete === b.id ? (
                    <span style={{ display: 'flex', gap: '0.3rem' }}>
                      <button onClick={() => deleteBuy(b.id)} style={{ background: 'var(--red-dim)', color: 'var(--red)', border: 'none', borderRadius: '4px', padding: '3px 10px', fontFamily: 'inherit', fontSize: '0.78rem', cursor: 'pointer' }}>Delete</button>
                      <button onClick={() => setConfirmDelete(null)} style={{ background: 'var(--bg-deep)', color: 'var(--text-muted)', border: '1px solid var(--border)', borderRadius: '4px', padding: '3px 10px', fontFamily: 'inherit', fontSize: '0.78rem', cursor: 'pointer' }}>Cancel</button>
                    </span>
                  ) : (
                    <button onClick={() => setConfirmDelete(b.id)} style={{ background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', fontSize: '0.82rem', fontFamily: 'inherit' }}>{'\u2715'}</button>
                  )}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── Asset Deep-Dive Tab ─────────────────────────────────────
function AssetsTab() {
  const [selected, setSelected] = useState(null);
  const [signals, setSignals] = useState([]);
  const [buys, setBuys] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    Promise.all([
      apiFetch('/api/signals?limit=200').catch(() => []),
      apiFetch('/api/buys?limit=200').catch(() => []),
    ]).then(([sData, bData]) => {
      setSignals(Array.isArray(sData) ? sData : (sData?.signals || sData?.data || []));
      setBuys(Array.isArray(bData) ? bData : (bData?.buys || bData?.data || []));
      setLoading(false);
    });
  }, []);

  useEffect(() => {
    if (!selected) return;
    const assetBuys = buys.filter(b => b.asset === selected).sort((a, b) => new Date(a.bought_at) - new Date(b.bought_at));
    if (assetBuys.length === 0) return;
    let cum = 0;
    const pts = assetBuys.map(b => { cum += parseFloat(b.buy_amount_usd || 0); return { date: (b.bought_at || '').slice(0, 10), cumulative: cum }; });

    renderChart('asset-dca-chart', {
      type: 'line',
      data: {
        labels: pts.map(p => new Date(p.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })),
        datasets: [{ label: 'Cumulative DCA ($)', data: pts.map(p => p.cumulative), borderColor: '#8b5cf6', backgroundColor: 'rgba(139,92,246,0.08)', fill: true, tension: 0.3, pointRadius: 2, pointHoverRadius: 5, borderWidth: 2 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1a0f2e', borderColor: '#2a1a4a', borderWidth: 1, titleColor: '#d4a843', bodyColor: '#e8e0f0', padding: 12, cornerRadius: 8, titleFont: { size: 13 }, bodyFont: { size: 13 } } },
        scales: {
          x: { ticks: { color: '#6d5e8a', font: { size: 11 }, maxRotation: 45 }, grid: { color: 'rgba(42,26,74,0.3)' } },
          y: { ticks: { color: '#6d5e8a', font: { size: 11 }, callback: v => '$' + v.toLocaleString() }, grid: { color: 'rgba(42,26,74,0.3)' } }
        }
      }
    });
    return () => destroyChart('asset-dca-chart');
  }, [selected, buys]);

  if (loading) return <div className="loading"><div className="spinner"/><span>Loading asset data...</span></div>;

  if (selected) {
    const thesis = ASSET_THESIS[selected] || {};
    const assetType = CALC_ASSETS.find(a => a.ticker === selected)?.type || 'Stocks';
    const assetSignals = signals.filter(s => s.asset === selected).sort((a, b) => new Date(b.received_at) - new Date(a.received_at));
    const sentSignals = assetSignals.filter(s => s.action_taken === 'sent');
    const assetBuysList = buys.filter(b => b.asset === selected).sort((a, b) => new Date(b.bought_at) - new Date(a.bought_at));
    const totalInvested = assetBuysList.reduce((s, b) => s + parseFloat(b.buy_amount_usd || 0), 0);
    const avgStrength = sentSignals.length > 0 ? sentSignals.reduce((s, b) => s + parseFloat(b.signal_strength || 0), 0) / sentSignals.length : 0;
    const avgMult = assetBuysList.length > 0 ? assetBuysList.reduce((s, b) => s + parseFloat(b.multiplier || 0), 0) / assetBuysList.length : 0;

    return (
      <div>
        <button className="back-btn" onClick={() => setSelected(null)} style={{ marginBottom: '1.5rem' }}>{'\u25C0'} BACK TO ALL ASSETS</button>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: '0.85rem', marginBottom: '0.5rem' }}>
          <span style={{ fontFamily: "'Cinzel', serif", fontSize: '2rem', fontWeight: 700, color: 'var(--gold)' }}>{selected}</span>
          <span style={{ fontSize: '0.95rem', color: 'var(--text-muted)' }}>{thesis.name || ''}</span>
        </div>
        <div style={{ display: 'flex', gap: '0.6rem', marginBottom: '1.75rem' }}>
          {thesis.layer && <span className="asset-tag" style={{ background: 'rgba(139,92,246,0.2)', color: 'var(--purple)' }}>{thesis.layer}</span>}
          <span className="asset-tag" style={{ background: 'rgba(42,26,74,0.5)', color: 'var(--text-secondary)' }}>{assetType}</span>
        </div>
        <div className="stats-grid" style={{ marginBottom: '1.75rem' }}>
          <StatCard title="Total Invested" value={'$' + totalInvested.toLocaleString(undefined, {maximumFractionDigits: 0})} />
          <StatCard title="Signals Fired" value={sentSignals.length} color="var(--purple)" />
          <StatCard title="Avg Strength" value={avgStrength.toFixed(2)} color="var(--green)" />
          <StatCard title="Avg Multiplier" value={avgMult > 0 ? avgMult.toFixed(1) + '\u00D7' : '\u2014'} color="var(--orange)" />
        </div>
        {thesis.thesis && (
          <div className="card" style={{ marginBottom: '1.75rem' }}>
            <div className="card-title" style={{ marginBottom: '0.85rem' }}>Investment Thesis</div>
            <p style={{ color: 'var(--text-secondary)', fontSize: '0.92rem', lineHeight: 1.8, marginBottom: '1.25rem' }}>{thesis.thesis}</p>
            <div className="card-title" style={{ marginBottom: '0.6rem' }}>Accumulator Rationale</div>
            <div className="thesis-block">{thesis.rationale}</div>
          </div>
        )}
        {assetBuysList.length > 0 && (
          <div className="chart-container">
            <div className="card-title" style={{ marginBottom: '1rem' }}>Cumulative DCA Curve</div>
            <div style={{ height: '240px' }}><canvas id="asset-dca-chart"></canvas></div>
          </div>
        )}
        <div className="card" style={{ overflowX: 'auto' }}>
          <div className="card-title" style={{ marginBottom: '1rem' }}>Buy History {'\u2014'} {assetBuysList.length} entries</div>
          <table className="signal-table">
            <thead><tr><th>Date</th><th>Strength</th><th>Multiplier</th><th>Amount</th><th>Days Wait</th></tr></thead>
            <tbody>
              {assetBuysList.map((b, i) => (
                <tr key={i}>
                  <td style={{ whiteSpace: 'nowrap' }}>{(b.bought_at || '').slice(0, 10)}</td>
                  <td>{parseFloat(b.signal_strength || 0).toFixed(2)}</td>
                  <td>{b.multiplier ? parseFloat(b.multiplier).toFixed(1) + '\u00D7' : '\u2014'}</td>
                  <td style={{ fontWeight: 600, color: 'var(--green)' }}>${parseFloat(b.buy_amount_usd || 0).toFixed(2)}</td>
                  <td>{b.days_since_last || '\u2014'}d</td>
                </tr>
              ))}
              {assetBuysList.length === 0 && <tr><td colSpan="5" style={{ textAlign: 'center', padding: '2rem', color: 'var(--text-muted)' }}>No buys for this asset</td></tr>}
            </tbody>
          </table>
        </div>
      </div>
    );
  }

  function urgencyClr(days) {
    if (days === null) return 'var(--text-muted)';
    if (days >= 40) return 'var(--red)';
    if (days >= 20) return 'var(--orange)';
    if (days >= 8) return 'var(--gold)';
    return 'var(--green)';
  }

  const summaries = CALC_ASSETS.map(a => {
    const t = ASSET_THESIS[a.ticker] || {};
    const assetBuysForTicker = buys.filter(b => b.asset === a.ticker);
    const total = assetBuysForTicker.reduce((s, b) => s + parseFloat(b.buy_amount_usd || 0), 0);
    const last = assetBuysForTicker.length > 0 ? assetBuysForTicker.sort((x, y) => new Date(y.bought_at) - new Date(x.bought_at))[0] : null;
    const lastD = last ? (last.bought_at || '').slice(0, 10) : null;
    const daysSince = lastD ? Math.round((new Date() - new Date(lastD)) / 86400000) : null;
    return { ticker: a.ticker, type: a.type, layer: t.layer, total, count: assetBuysForTicker.length, daysSince };
  });

  return (
    <div>
      <div className="section-sub" style={{ letterSpacing: '0.1em', textTransform: 'uppercase' }}>
        Click any asset for the full deep-dive — thesis, signal history, DCA curve
      </div>
      <div className="asset-deep-grid">
        {summaries.map(a => (
          <div key={a.ticker} className="card asset-deep-card" onClick={() => setSelected(a.ticker)}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '0.85rem' }}>
              <div>
                <div style={{ fontFamily: "'Cinzel', serif", color: 'var(--gold)', fontSize: '1.25rem', fontWeight: 700 }}>{a.ticker}</div>
                {a.layer && <div style={{ color: 'var(--text-muted)', fontSize: '0.75rem', marginTop: '3px' }}>{a.layer}</div>}
              </div>
              {a.daysSince !== null && (
                <span style={{ background: urgencyClr(a.daysSince) + '22', border: '1px solid ' + urgencyClr(a.daysSince) + '44', borderRadius: '20px', padding: '3px 12px', color: urgencyClr(a.daysSince), fontSize: '0.82rem' }}>
                  {a.daysSince}d ago
                </span>
              )}
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '0.45rem' }}>
              <span style={{ color: 'var(--text-muted)', fontSize: '0.85rem' }}>Deployed</span>
              <span style={{ color: 'var(--text-primary)', fontSize: '0.88rem', fontWeight: 600 }}>${a.total.toLocaleString(undefined, {maximumFractionDigits: 0})}</span>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between' }}>
              <span style={{ color: 'var(--text-muted)', fontSize: '0.85rem' }}>Signals</span>
              <span style={{ color: 'var(--purple)', fontSize: '0.88rem', fontWeight: 600 }}>{a.count}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Backtest Tab ───────────────────────────────────────────
function BacktestTab() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    apiFetch('/api/backtest_summary')
      .then(setData)
      .catch(() => setData(null))
      .finally(() => setLoading(false));
  }, []);

  if (loading) return <div className="loading"><div className="spinner"/><span>Loading backtest data...</span></div>;
  if (!data) return (
    <div className="card" style={{ textAlign: 'center', padding: '3rem' }}>
      <div style={{ color: 'var(--text-muted)', fontSize: '0.92rem' }}>
        Backtest data not available yet.
      </div>
    </div>
  );

  const summary = data.summary || data;
  const assets = data.assets || data.data || [];

  return (
    <div>
      {summary && (
        <div className="stats-grid" style={{ marginBottom: '1.75rem' }}>
          <StatCard title="Total Trades" value={summary.total_trades || '\u2014'} />
          <StatCard title="Win Rate" value={summary.win_rate ? `${summary.win_rate}%` : '\u2014'} color="var(--green)" />
          <StatCard title="Avg Return" value={summary.avg_return ? `${summary.avg_return}%` : '\u2014'} color="var(--purple)" />
        </div>
      )}
      {Array.isArray(assets) && assets.length > 0 && (
        <div className="card" style={{ overflowX: 'auto' }}>
          <div className="card-title" style={{ marginBottom: '1rem' }}>Per-Asset Backtest Results</div>
          <table className="signal-table">
            <thead><tr><th>Asset</th><th>Trades</th><th>Win Rate</th><th>Total Return</th><th>Avg Per Trade</th></tr></thead>
            <tbody>
              {assets.map((a, i) => (
                <tr key={i}>
                  <td style={{ color: 'var(--gold)', fontWeight: 600 }}>{a.ticker || a.asset}</td>
                  <td>{a.trades || a.total_trades || '\u2014'}</td>
                  <td style={{ color: 'var(--green)' }}>{a.win_rate ? `${a.win_rate}%` : '\u2014'}</td>
                  <td>{a.total_return ? `${a.total_return}%` : '\u2014'}</td>
                  <td>{a.avg_return ? `${a.avg_return}%` : '\u2014'}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

  return (
    <div className="preview-bar">
      <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
        <span style={{ fontSize: '0.75rem', opacity: 0.9 }}>{'\uD83D\uDD13'} Preview Mode</span>
        <span style={{ fontSize: '0.75rem', opacity: 0.7 }}>Full access for</span>
        <span className="preview-bar-timer">{mins}:{secs.toString().padStart(2, '0')}</span>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}>
        <a href="/dashboard" style={{ fontSize: '0.75rem', color: 'rgba(255,255,255,0.7)', textDecoration: 'underline' }}>
          Member? Sign in
        </a>
        <a href="https://whop.com/soomario-strategies/soomario-accumulator/" target="_blank" className="preview-subscribe-btn">
          Subscribe $19.99/mo
        </a>
      </div>
      <div className="preview-bar-progress" style={{ width: pct + '%' }} />
    </div>
  );
}

// ─── Main App ───────────────────────────────────────────────
const PREVIEW_DURATION = 300; // 5 minutes in seconds

function App() {
  const [auth, setAuth] = useState(null);
  const [loading, setLoading] = useState(true);
  const [activeTab, setActiveTab] = useState('signals');

  // Preview mode
  const isPreview = window.location.pathname.includes('/preview');
  const [previewSecondsLeft, setPreviewSecondsLeft] = useState(PREVIEW_DURATION);
  const [previewExpired, setPreviewExpired] = useState(false);

  const urlParams = new URLSearchParams(window.location.search);
  const urlError = urlParams.get('error');

  useEffect(() => {
    if (isPreview) {
      // Skip auth for preview — go straight to dashboard
      setAuth({ authenticated: true, has_access: true, username: 'Preview', picture: null, preview: true });
      setLoading(false);
      return;
    }
    fetch('/auth/me', { credentials: 'include' })
      .then(r => r.json())
      .then(data => setAuth(data))
      .catch(() => setAuth({ authenticated: false }))
      .finally(() => setLoading(false));
  }, []);

  // Preview countdown timer
  useEffect(() => {
    if (!isPreview || previewExpired) return;
    const interval = setInterval(() => {
      setPreviewSecondsLeft(prev => {
        if (prev <= 1) {
          clearInterval(interval);
          setPreviewExpired(true);
          return 0;
        }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(interval);
  }, [isPreview, previewExpired]);

  if (loading) {
    return (
      <div className="login-container">
        <div className="spinner" />
        <div style={{ color: 'var(--text-muted)', fontSize: '0.88rem' }}>Initializing...</div>
      </div>
    );
  }

  if (!auth?.authenticated) return <LoginScreen error={urlError} />;
  if (!auth.has_access) return <NoAccessScreen user={auth} />;

  const tabs = [
    { id: 'signals', label: '\u26A1 Signals' },
    { id: 'portfolio', label: '\uD83D\uDCCA Portfolio' },
    { id: 'performance', label: '\uD83D\uDCC8 Performance' },
    { id: 'calendar', label: '\uD83D\uDCC5 Calendar' },
    { id: 'assets', label: '\uD83D\uDD0D Assets' },
    ...(!isPreview ? [{ id: 'myportfolio', label: '\uD83D\uDCBC My Portfolio' }] : []),
    { id: 'calculator', label: '\uD83E\uDDEE Calculator' },
    { id: 'backtest', label: '\uD83D\uDCCA Backtest' },
  ];

  return (
    <div className="dashboard" style={isPreview ? { paddingTop: '42px' } : {}}>
      {isPreview && !previewExpired && (
        <PreviewBanner secondsLeft={previewSecondsLeft} totalSeconds={PREVIEW_DURATION} />
      )}
      {previewExpired && <PreviewLockout />}

      <header className="dash-header" style={isPreview ? { top: '42px' } : {}}>
        <div className="dash-brand">
          <GearIcon size={28} />
          <div>
            <div className="dash-brand-name">SOOMARIO</div>
            <div className="dash-brand-tag">Accumulator Dashboard</div>
          </div>
        </div>
        <div className="dash-user">
          {auth.preview ? (
            <a href="https://whop.com/soomario-strategies/soomario-accumulator/" target="_blank" style={{
              background: 'linear-gradient(135deg, var(--gold-dim), var(--gold))',
              color: 'var(--bg-deep)', padding: '0.5rem 1.2rem', borderRadius: '8px',
              fontFamily: "'JetBrains Mono', monospace", fontSize: '0.78rem', fontWeight: 700,
              textDecoration: 'none'
            }}>
              Subscribe
            </a>
          ) : (
            <React.Fragment>
              {auth.picture && <img src={auth.picture} className="dash-user-avatar" alt="" />}
              <div>
                <div className="dash-user-name">{auth.username}</div>
                <button className="dash-logout" onClick={() => window.location.href = '/auth/logout'}>
                  Sign out
                </button>
              </div>
            </React.Fragment>
          )}
        </div>
      </header>

      <nav className="tab-nav" style={isPreview ? { top: 'calc(42px + 56px)' } : {}}>
        {tabs.map(t => (
          <button key={t.id} className={`tab-btn ${activeTab === t.id ? 'active' : ''}`} onClick={() => setActiveTab(t.id)}>
            {t.label}
          </button>
        ))}
      </nav>

      <main className="dash-content">
        {activeTab === 'signals' && <SignalsTab />}
        {activeTab === 'portfolio' && <PortfolioTab />}
        {activeTab === 'performance' && <PerformanceTab />}
        {activeTab === 'calendar' && <CalendarTab />}
        {activeTab === 'assets' && <AssetsTab />}
        {activeTab === 'myportfolio' && !isPreview && <MyPortfolioTab />}
        {activeTab === 'calculator' && <CalculatorTab />}
        {activeTab === 'backtest' && <BacktestTab />}
      </main>

      <footer style={{
        textAlign: 'center',
        padding: '2rem',
        fontSize: '0.78rem',
        color: 'var(--text-muted)',
        borderTop: '1px solid var(--border)',
      }}>
        Soomario Strategies · Accumulator · Signals are informational, not financial advice
      </footer>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
