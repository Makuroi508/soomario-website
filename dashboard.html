<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soomario Accumulator — Member Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<style>
:root {
  --bg-deep: #0a0612;
  --bg-panel: #12091e;
  --bg-card: #1a0f2e;
  --bg-card-hover: #221540;
  --border: #2a1a4a;
  --border-glow: #6b3fa0;
  --gold: #d4a843;
  --gold-bright: #f0c850;
  --gold-dim: #8a6d2b;
  --purple: #8b5cf6;
  --purple-dim: #5b3a9e;
  --text-primary: #e8e0f0;
  --text-secondary: #9a8bb5;
  --text-muted: #6d5e8a;
  --green: #4ade80;
  --green-dim: #166534;
  --red: #f87171;
  --red-dim: #7f1d1d;
  --blue: #60a5fa;
  --orange: #fb923c;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.92rem;
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
}

/* Subtle ambient glow */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(107,63,160,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(212,168,67,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(139,92,246,0.05) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

#root { position: relative; z-index: 1; }

/* ─── Login Screen ─── */
.login-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem;
}

.login-logo {
  font-family: 'Cinzel', serif;
  font-size: 2.8rem;
  font-weight: 700;
  color: var(--gold);
  text-shadow: 0 0 30px rgba(212,168,67,0.3);
  margin-bottom: 0.5rem;
  letter-spacing: 0.15em;
}

.login-subtitle {
  font-size: 0.88rem;
  color: var(--text-secondary);
  margin-bottom: 3rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
}

.login-card {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 3rem;
  max-width: 440px;
  width: 100%;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.login-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), var(--purple), var(--gold), transparent);
}

.login-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.75rem;
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  color: var(--bg-deep);
  border: none;
  padding: 1rem 2.5rem;
  border-radius: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  text-decoration: none;
  letter-spacing: 0.05em;
}

.login-btn:hover {
  background: linear-gradient(135deg, var(--gold), var(--gold-bright));
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(212,168,67,0.3);
}

.login-features {
  margin-top: 2rem;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  text-align: left;
}

.login-feature {
  font-size: 0.82rem;
  color: var(--text-secondary);
  padding: 0.5rem;
  border-left: 2px solid var(--border);
}

.login-feature span { color: var(--gold); }

/* ─── No Access Screen ─── */
.no-access-card {
  background: var(--bg-panel);
  border: 1px solid var(--red-dim);
  border-radius: 12px;
  padding: 3rem;
  max-width: 480px;
  width: 100%;
  text-align: center;
}

.subscribe-btn {
  display: inline-block;
  background: linear-gradient(135deg, var(--purple-dim), var(--purple));
  color: white;
  padding: 1rem 2.5rem;
  border-radius: 8px;
  text-decoration: none;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 0.95rem;
  transition: all 0.3s;
  margin-top: 1.5rem;
}

.subscribe-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(139,92,246,0.3);
}

/* ─── Dashboard Layout ─── */
.dashboard { min-height: 100vh; }

.dash-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 2rem;
  border-bottom: 1px solid var(--border);
  background: rgba(18,9,30,0.9);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 100;
}

.dash-brand {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.dash-brand-name {
  font-family: 'Cinzel', serif;
  font-size: 1.4rem;
  color: var(--gold);
  letter-spacing: 0.1em;
}

.dash-brand-tag {
  font-size: 0.72rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.2em;
}

.dash-user {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.dash-user-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 2px solid var(--gold-dim);
}

.dash-user-name {
  font-size: 0.88rem;
  color: var(--text-secondary);
}

.dash-logout {
  font-size: 0.78rem;
  color: var(--text-muted);
  cursor: pointer;
  text-decoration: underline;
  background: none;
  border: none;
  font-family: inherit;
}

.dash-logout:hover { color: var(--red); }

/* ─── Tab Nav ─── */
.tab-nav {
  display: flex;
  gap: 0;
  padding: 0 2rem;
  border-bottom: 1px solid var(--border);
  background: rgba(18,9,30,0.5);
  overflow-x: auto;
}

.tab-btn {
  padding: 1rem 1.5rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--text-muted);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  letter-spacing: 0.05em;
}

.tab-btn:hover { color: var(--text-secondary); }
.tab-btn.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
}

/* ─── Content Area ─── */
.dash-content {
  padding: 2rem 2.5rem 3rem;
  max-width: 1400px;
  margin: 0 auto;
}

/* ─── Cards ─── */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
  transition: border-color 0.2s;
}

.card:hover { border-color: var(--border-glow); }

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
}

.card-title {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.card-value {
  font-size: 2rem;
  font-weight: 700;
  color: var(--gold);
  line-height: 1.2;
}

.card-label {
  font-size: 0.82rem;
  color: var(--text-muted);
  margin-top: 0.35rem;
}

/* ─── Stats Grid ─── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1rem;
  margin-bottom: 1.75rem;
}

/* ─── Signal Feed ─── */
.signal-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.88rem;
}

.signal-table th {
  text-align: left;
  padding: 0.85rem 0.9rem;
  color: var(--text-muted);
  font-weight: 500;
  text-transform: uppercase;
  font-size: 0.78rem;
  letter-spacing: 0.1em;
  border-bottom: 1px solid var(--border);
}

.signal-table td {
  padding: 0.85rem 0.9rem;
  border-bottom: 1px solid rgba(42,26,74,0.4);
  color: var(--text-secondary);
}

.signal-table tr:hover td { background: rgba(42,26,74,0.3); }

.badge {
  display: inline-block;
  padding: 0.25rem 0.65rem;
  border-radius: 4px;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.05em;
}

.badge-sent { background: var(--green-dim); color: var(--green); }
.badge-skipped { background: rgba(251,146,60,0.15); color: var(--orange); }
.badge-high { background: rgba(212,168,67,0.15); color: var(--gold-bright); }
.badge-medium { background: rgba(96,165,250,0.15); color: var(--blue); }
.badge-low { background: rgba(154,139,181,0.15); color: var(--text-secondary); }

/* ─── Asset Cards Grid ─── */
.assets-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1rem;
}

.asset-card { position: relative; overflow: hidden; }

.asset-card::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 60px; height: 60px;
  background: radial-gradient(circle at top right, rgba(212,168,67,0.1), transparent 70%);
  pointer-events: none;
}

.asset-ticker {
  font-family: 'Cinzel', serif;
  font-size: 1.3rem;
  color: var(--gold);
  font-weight: 700;
}

.asset-type {
  font-size: 0.72rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.15em;
}

.asset-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
  margin-top: 1rem;
}

.asset-stat-label {
  font-size: 0.72rem;
  color: var(--text-muted);
  text-transform: uppercase;
}

.asset-stat-value {
  font-size: 1rem;
  color: var(--text-primary);
  font-weight: 600;
}

/* ─── DCA Calculator ─── */
.calc-form {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1rem;
  margin-bottom: 1.5rem;
}

.calc-field label {
  display: block;
  font-size: 0.78rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 0.4rem;
}

.calc-field input, .calc-field select {
  width: 100%;
  padding: 0.7rem 0.9rem;
  background: var(--bg-deep);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.92rem;
  outline: none;
  transition: border-color 0.2s;
}

.calc-field input:focus, .calc-field select:focus {
  border-color: var(--gold-dim);
}

.calc-results {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1rem;
}

/* ─── Chart Container ─── */
.chart-container {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
  margin-bottom: 1.75rem;
}

.chart-container canvas { max-height: 300px; }

/* ─── Loading ─── */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 3rem;
  color: var(--text-muted);
  font-size: 0.92rem;
}

.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 1rem;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Error ─── */
.error-banner {
  background: var(--red-dim);
  border: 1px solid rgba(248,113,113,0.3);
  border-radius: 8px;
  padding: 1rem;
  margin-bottom: 1rem;
  font-size: 0.88rem;
  color: var(--red);
}

/* ─── Info Tooltip ─── */
.info-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1px solid var(--border-glow);
  background: rgba(107,63,160,0.15);
  color: var(--purple);
  font-size: 0.72rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
  position: relative;
  font-family: 'JetBrains Mono', monospace;
}
.info-btn:hover {
  background: rgba(107,63,160,0.3);
  border-color: var(--purple);
  transform: scale(1.1);
}

.tooltip-popup {
  position: absolute;
  top: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-panel);
  border: 1px solid var(--border-glow);
  border-radius: 10px;
  padding: 1rem 1.15rem;
  font-size: 0.85rem;
  font-weight: 400;
  color: var(--text-secondary);
  line-height: 1.65;
  width: 280px;
  z-index: 50;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  pointer-events: none;
}
.tooltip-popup::before {
  content: '';
  position: absolute;
  top: -6px;
  left: 50%;
  transform: translateX(-50%) rotate(45deg);
  width: 10px;
  height: 10px;
  background: var(--bg-panel);
  border-left: 1px solid var(--border-glow);
  border-top: 1px solid var(--border-glow);
}

/* ─── Responsive ─── */
@media (max-width: 768px) {
  .dash-header { padding: 0.75rem 1rem; }
  .tab-nav { padding: 0 1rem; }
  .dash-content { padding: 1.25rem; }
  .login-logo { font-size: 2rem; }
  .login-card { padding: 2rem 1.5rem; }
  .login-features { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .assets-grid { grid-template-columns: 1fr; }
  .tooltip-popup { width: 220px; font-size: 0.8rem; }
}

/* ─── Gear SVG decorations ─── */
.gear-icon {
  fill: none;
  stroke: var(--border);
  stroke-width: 1.5;
}

/* ─── Calendar Heatmap ─── */
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.cal-header {
  text-align: center;
  font-size: 0.72rem;
  color: var(--text-muted);
  letter-spacing: 0.15em;
  padding: 6px 0;
  text-transform: uppercase;
}
.cal-cell {
  aspect-ratio: 1;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 1px solid rgba(42,26,74,0.25);
  transition: all 0.15s;
  position: relative;
  cursor: default;
}
.cal-cell.has-signals {
  cursor: pointer;
  border-color: rgba(74,222,128,0.25);
}
.cal-cell.has-signals:hover {
  border-color: var(--green);
  transform: scale(1.08);
  z-index: 2;
}
.cal-day { font-size: 0.92rem; font-weight: 400; }
.cal-day.active { font-weight: 700; color: var(--text-primary); }
.cal-dots {
  display: flex;
  gap: 2px;
  margin-top: 3px;
}
.cal-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--green);
}

/* ─── Asset Deep-Dive ─── */
.asset-deep-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1rem;
}
.asset-deep-card {
  cursor: pointer;
  transition: border-color 0.2s, transform 0.15s;
}
.asset-deep-card:hover {
  border-color: var(--border-glow);
  transform: translateY(-2px);
}
.asset-tag {
  display: inline-block;
  padding: 3px 12px;
  border-radius: 20px;
  font-size: 0.75rem;
}
.thesis-block {
  padding: 1.15rem 1.35rem;
  background: var(--bg-panel);
  border-radius: 8px;
  border-left: 3px solid var(--gold);
  font-size: 0.88rem;
  color: var(--text-primary);
  line-height: 1.75;
}
.back-btn {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  color: var(--gold);
  padding: 0.6rem 1.2rem;
  border-radius: 8px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.85rem;
  letter-spacing: 0.05em;
  transition: border-color 0.2s;
}
.back-btn:hover { border-color: var(--gold-dim); }

/* ─── Performance Legend ─── */
.perf-legend {
  display: flex;
  gap: 1.5rem;
  justify-content: center;
  margin-top: 1rem;
}
.perf-legend span {
  font-size: 0.82rem;
  display: flex;
  align-items: center;
  gap: 6px;
}
.perf-legend-dot {
  width: 12px;
  height: 3px;
  border-radius: 2px;
}

/* ─── Calendar Nav ─── */
.cal-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.25rem;
}
.cal-nav-btn {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  color: var(--gold);
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 1rem;
  transition: border-color 0.2s;
}
.cal-nav-btn:hover { border-color: var(--gold-dim); }
.cal-month-label {
  color: var(--gold);
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  font-family: 'Cinzel', serif;
}

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-glow); }

/* ─── Section Header ─── */
.section-header {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 0.5rem;
  letter-spacing: 0.02em;
}
.section-sub {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 1.25rem;
}

/* ─── Metric Card (new style for Performance) ─── */
.metric-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.25rem 1.5rem;
  position: relative;
  transition: border-color 0.2s;
}
.metric-card:hover { border-color: var(--border-glow); }
.metric-card .metric-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.6rem;
}
.metric-card .metric-label {
  font-size: 0.85rem;
  color: var(--text-secondary);
  font-weight: 500;
  letter-spacing: 0.04em;
}
.metric-card .metric-value {
  font-size: 2rem;
  font-weight: 700;
  line-height: 1.2;
}
.metric-card .metric-sub {
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-top: 0.3rem;
}


/* ─── Preview Mode ─── */
.preview-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 200;
  background: linear-gradient(135deg, #5b3a9e, #8b5cf6);
  padding: 0.6rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  color: white;
}
.preview-bar-timer {
  font-weight: 700;
  font-size: 1rem;
  min-width: 50px;
  text-align: center;
}
.preview-bar-progress {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 3px;
  background: var(--gold);
  transition: width 1s linear;
}
.preview-bar .preview-subscribe-btn {
  background: var(--gold);
  color: var(--bg-deep);
  border: none;
  padding: 0.4rem 1.2rem;
  border-radius: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  transition: transform 0.2s;
}
.preview-bar .preview-subscribe-btn:hover {
  transform: scale(1.05);
}

.preview-lockout {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 300;
  background: rgba(10, 6, 18, 0.92);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
}
.preview-lockout-card {
  background: var(--bg-panel);
  border: 2px solid var(--gold-dim);
  border-radius: 16px;
  padding: 3rem;
  max-width: 480px;
  width: 90%;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.preview-lockout-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--gold), var(--purple), var(--gold), transparent);
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ─── API Helper ─────────────────────────────────────────────
const API_BASE = '';

async function apiFetch(path) {
  const res = await fetch(`${API_BASE}${path}`, { credentials: 'include' });
  if (!res.ok) throw new Error(`API ${res.status}`);
  return res.json();
}

// ─── Chart Helper (Chart.js 3.9.1 + getElementById) ─────
const _chartInstances = {};
function renderChart(canvasId, config) {
  if (_chartInstances[canvasId]) {
    _chartInstances[canvasId].destroy();
    delete _chartInstances[canvasId];
  }
  requestAnimationFrame(() => {
    const el = document.getElementById(canvasId);
    if (!el) return;
    const parent = el.parentElement;
    if (parent) {
      el.width = parent.clientWidth;
      el.height = parent.clientHeight;
    }
    _chartInstances[canvasId] = new Chart(el.getContext('2d'), config);
  });
}
function destroyChart(canvasId) {
  if (_chartInstances[canvasId]) {
    _chartInstances[canvasId].destroy();
    delete _chartInstances[canvasId];
  }
}

// ─── Gear SVG Component ─────────────────────────────────────
function GearIcon({ size = 24 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" className="gear-icon">
      <path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/>
      <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.32 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
    </svg>
  );
}

// ─── Info Button with Tooltip ───────────────────────────────
function InfoButton({ text }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    if (!open) return;
    function handleClick(e) {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    }
    document.addEventListener('mousedown', handleClick);
    return () => document.removeEventListener('mousedown', handleClick);
  }, [open]);

  return (
    <span ref={ref} style={{ position: 'relative', display: 'inline-flex' }}>
      <span className="info-btn" onClick={() => setOpen(!open)}>?</span>
      {open && <div className="tooltip-popup">{text}</div>}
    </span>
  );
}

// ─── Login Screen ───────────────────────────────────────────
function LoginScreen({ error }) {
  return (
    <div className="login-container">
      <div className="login-logo">SOOMARIO</div>
      <div className="login-subtitle">Algorithmic Accumulation Engine</div>
      <div className="login-card">
        <GearIcon size={40} />
        <h2 style={{
          fontFamily: "'Cinzel', serif",
          fontSize: '1.3rem',
          color: 'var(--text-primary)',
          margin: '1.5rem 0 0.5rem'
        }}>Member Dashboard</h2>
        <p style={{ fontSize: '0.88rem', color: 'var(--text-secondary)', marginBottom: '2rem', lineHeight: 1.65 }}>
          Sign in with your Whop account to access live signals,
          portfolio tracking, and the DCA calculator.
        </p>
        {error && <div className="error-banner">{decodeURIComponent(error)}</div>}
        <a href="/auth/whop/login" className="login-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
          </svg>
          Sign in with Whop
        </a>
        <div className="login-features">
          <div className="login-feature"><span>⚡</span> Live Signal Feed</div>
          <div className="login-feature"><span>📊</span> Portfolio Tracker</div>
          <div className="login-feature"><span>📈</span> Performance Tracker</div>
          <div className="login-feature"><span>📅</span> Signal Calendar</div>
          <div className="login-feature"><span>🔍</span> Asset Deep-Dives</div>
          <div className="login-feature"><span>💼</span> Personal Buy Log</div>
          <div className="login-feature"><span>🧮</span> DCA Budget Allocator</div>
          <div className="login-feature"><span>📊</span> Backtest Results</div>
        </div>
      </div>
      <p style={{ fontSize: '0.75rem', color: 'var(--text-muted)', marginTop: '2rem', textAlign: 'center' }}>
        Requires Soomario Accumulator or Elite subscription
      </p>

}

// ─── No Access Screen ───────────────────────────────────────
function NoAccessScreen({ user }) {
  return (
    <div className="login-container">
      <div className="login-logo">SOOMARIO</div>
      <div className="login-subtitle">Algorithmic Accumulation Engine</div>
      <div className="no-access-card">
        <h2 style={{ fontFamily: "'Cinzel', serif", fontSize: '1.3rem', color: 'var(--red)', marginBottom: '1rem' }}>
          Subscription Required
        </h2>
        <p style={{ fontSize: '0.92rem', color: 'var(--text-secondary)', lineHeight: 1.65 }}>
          Hey {user.username}! Your account doesn't have an active
          Soomario Accumulator or Elite subscription.
        </p>
        <a href="https://whop.com/soomario-strategies/" className="subscribe-btn">
          Subscribe on Whop →
        </a>
        <div style={{ marginTop: '2rem' }}>
          <button
            onClick={() => window.location.href = '/auth/logout'}
            style={{
              background: 'none', border: 'none', color: 'var(--text-muted)',
              fontFamily: 'inherit', fontSize: '0.85rem', cursor: 'pointer',

            }}
          >
            Sign out
          </button>

// ─── Stat Card ──────────────────────────────────────────────
function StatCard({ title, value, label, color, info }) {
  return (
    <div className="card">
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.2rem' }}>
        <div className="card-title">{title}</div>
        {info && <InfoButton text={info} />}
      </div>
      <div className="card-value" style={{ color: color || 'var(--gold)' }}>{value}</div>
      {label && <div className="card-label">{label}</div>}
    </div>
  );
}

// ─── Signals Tab ────────────────────────────────────────────
function SignalsTab() {
  const [signals, setSignals] = useState([]);
  const [buys, setBuys] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [selectedSignal, setSelectedSignal] = useState(null);

  // User budget — persisted in localStorage
  const BUDGET_KEY = 'soomario_user_budget';
  const BASE_BUDGET = 1500; // Server calculates at $1,500/mo
  const [userBudget, setUserBudget] = useState(() => {
    try { return parseFloat(localStorage.getItem(BUDGET_KEY)) || BASE_BUDGET; }
    catch { return BASE_BUDGET; }
  });
  const budgetScale = userBudget / BASE_BUDGET;

  function updateBudget(val) {
    const num = Math.max(0, val);
    setUserBudget(num);
    try { localStorage.setItem(BUDGET_KEY, num.toString()); } catch {}
  }

  useEffect(() => {
    function fetchData() {
      Promise.all([
        apiFetch('/api/signals?limit=200'),
        apiFetch('/api/buys?limit=200').catch(() => []),
      ])
        .then(([sData, bData]) => {
          const sList = Array.isArray(sData) ? sData : (sData.signals || sData.data || []);
          setSignals(sList);
          const bList = Array.isArray(bData) ? bData : (bData?.buys || bData?.data || []);
          setBuys(bList);
        })
        .catch(e => setError(e.message))
        .finally(() => setLoading(false));
    }
    fetchData();
    const interval = setInterval(fetchData, 180000);
    return () => clearInterval(interval);
  }, []);

  if (loading) return <div className="loading"><div className="spinner"/><span>Loading signals...</span></div>;
  if (error) return <div className="error-banner">Failed to load signals: {error}</div>;

  const sent = signals.filter(s => s.action_taken === 'sent').length;
  const skipped = signals.filter(s => s.action_taken !== 'sent').length;

  function findBuy(signal) {
    if (!signal || signal.action_taken !== 'sent') return null;
    return buys.find(b => b.signal_id === signal.id) ||
           buys.find(b => b.asset === signal.asset && b.bought_at && signal.received_at && b.bought_at.slice(0, 10) === signal.received_at.slice(0, 10)) ||
           null;
  }

  const selectedBuy = selectedSignal ? findBuy(selectedSignal) : null;

  return (
    <div>
      {/* ── My Budget Bar ── */}
      <div className="card" style={{ marginBottom: '1.25rem', padding: '1rem 1.5rem', borderColor: 'var(--gold-dim)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: '1rem', flexWrap: 'wrap' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
            <span style={{ fontSize: '0.85rem', color: 'var(--text-secondary)' }}>My Monthly Budget</span>
            <InfoButton text="Set your DCA budget and all signal amounts will scale to match. $500/mo sees amounts at 1/3 of the model. $3,000/mo sees 2x. Your budget is saved in your browser." />
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: '0.4rem' }}>
            <span style={{ color: 'var(--gold)', fontSize: '1.3rem', fontWeight: 700 }}>$</span>
            <input type="number" value={userBudget} min={0} step={100}
              onChange={e => updateBudget(+e.target.value)}
              style={{ width: '110px', fontSize: '1.3rem', fontWeight: 700, background: 'var(--bg-deep)', border: '1px solid var(--border)', color: 'var(--gold)', padding: '0.35rem 0.6rem', borderRadius: '8px', fontFamily: 'inherit' }} />
            <span style={{ fontSize: '0.85rem', color: 'var(--text-muted)' }}>/month</span>
          </div>
          <div style={{ display: 'flex', gap: '0.35rem', flexWrap: 'wrap' }}>
            {[500, 1000, 1500, 2500, 5000].map(v => (
              <button key={v} onClick={() => updateBudget(v)} style={{
                background: userBudget === v ? 'var(--gold)' : 'var(--bg-deep)',
                color: userBudget === v ? 'var(--bg-deep)' : 'var(--text-muted)',
                border: '1px solid var(--border)', borderRadius: '6px', padding: '0.3rem 0.7rem',
                fontSize: '0.75rem', cursor: 'pointer', fontFamily: 'inherit', fontWeight: 600
              }}>${v >= 1000 ? (v/1000) + 'k' : v}</button>
            ))}
          </div>
          {userBudget !== BASE_BUDGET && (
            <span style={{ fontSize: '0.78rem', color: 'var(--purple)', marginLeft: 'auto' }}>
              {budgetScale < 1 ? (budgetScale * 100).toFixed(0) + '% of model' : budgetScale.toFixed(1) + 'x model'}
            </span>
          )}
        </div>
      </div>

      <div className="stats-grid">
        <StatCard title="Total Signals" value={signals.length} label="All recorded signals" />
        <StatCard title="Sent" value={sent} color="var(--green)" label="Buy signals executed" />
        <StatCard title="Skipped" value={skipped} color="var(--orange)" label="Below threshold / cooldown" />
      </div>

      {selectedSignal && (
        <div className="card" style={{ marginBottom: '1.75rem', borderColor: 'var(--gold-dim)', position: 'relative' }}>
          <button onClick={() => setSelectedSignal(null)} style={{ position: 'absolute', top: '1.25rem', right: '1.25rem', background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', fontSize: '1.3rem', fontFamily: 'inherit' }}>{'\u2715'}</button>
          <div style={{ fontFamily: "'Cinzel', serif", fontSize: '1.2rem', color: 'var(--gold)', marginBottom: '1.25rem', letterSpacing: '0.05em' }}>
            {'\uD83C\uDFAF'} SOOMARIO SIGNAL: {selectedSignal.asset}
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: '1.25rem', marginBottom: '1.25rem' }}>
            <div>
              <div style={{ fontSize: '0.78rem', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: '0.3rem' }}>Signal Strength</div>
              <div style={{ fontSize: '1.5rem', fontWeight: 700, color: 'var(--green)' }}>{parseFloat(selectedSignal.signal_strength || 0).toFixed(1)}%</div>
            </div>
            <div>
              <div style={{ fontSize: '0.78rem', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: '0.3rem' }}>Multiplier</div>
              <div style={{ fontSize: '1.5rem', fontWeight: 700, color: 'var(--orange)' }}>{selectedBuy ? parseFloat(selectedBuy.multiplier).toFixed(2) + '\u00D7' : '\u2014'}</div>
            </div>
            <div>
              <div style={{ fontSize: '0.78rem', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: '0.3rem' }}>Days Since Last Buy</div>
              <div style={{ fontSize: '1.5rem', fontWeight: 700, color: 'var(--blue)' }}>{selectedBuy ? Math.round(selectedBuy.days_since_last) : '\u2014'}</div>
            </div>
            <div>
              <div style={{ fontSize: '0.78rem', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: '0.3rem' }}>Price at Signal</div>
              <div style={{ fontSize: '1.5rem', fontWeight: 700, color: 'var(--text-primary)' }}>${parseFloat(selectedSignal.price || 0).toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
            </div>
          </div>

          {selectedBuy && (
            <div style={{ background: 'var(--bg-deep)', borderRadius: '10px', padding: '1.25rem', marginBottom: '1rem' }}>
              <div style={{ fontSize: '0.78rem', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: '0.75rem' }}>{'\uD83D\uDCB0'} Recommended Buy Amount (${userBudget.toLocaleString()}/mo budget)</div>
              <div style={{ fontSize: '1.8rem', fontWeight: 700, color: 'var(--green)' }}>${(parseFloat(selectedBuy.buy_amount_usd) * budgetScale).toFixed(2)}</div>
              <div style={{ fontSize: '0.82rem', color: 'var(--text-muted)', marginTop: '0.5rem' }}>
                Accumulated: ${(parseFloat(selectedBuy.accumulated_usd) * budgetScale).toFixed(2)} {'\u00D7'} {parseFloat(selectedBuy.multiplier).toFixed(2)} multiplier
              </div>
              {userBudget !== BASE_BUDGET && (
                <div style={{ fontSize: '0.75rem', color: 'var(--purple)', marginTop: '0.4rem' }}>
                  Model (${BASE_BUDGET.toLocaleString()}/mo): ${parseFloat(selectedBuy.buy_amount_usd).toFixed(2)}
                </div>
              )}
            </div>
          )}

          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.82rem', color: 'var(--text-muted)' }}>
            <span>{'\u23F0'} {new Date(selectedSignal.received_at).toLocaleString()} UTC</span>
            <span style={{ color: selectedSignal.action_taken === 'sent' ? 'var(--green)' : 'var(--orange)' }}>
              {selectedSignal.action_taken === 'sent' ? '\u2705 Signal Sent' : '\u26A0\uFE0F ' + (selectedSignal.skip_reason || 'Skipped')}
            </span>
          </div>
        </div>
      )}

      <div className="card" style={{ overflowX: 'auto' }}>
        <div className="card-title" style={{ marginBottom: '0.85rem' }}>Click any signal to see details</div>
        <table className="signal-table">
          <thead>
            <tr>
              <th>Time</th>
              <th>Asset</th>
              <th>Strength</th>
              <th>Multiplier</th>
              <th>Amount</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            {signals.map((s, i) => {
              const buy = findBuy(s);
              return (
                <tr key={i} onClick={() => setSelectedSignal(s)} style={{ cursor: 'pointer' }}>
                  <td style={{ whiteSpace: 'nowrap' }}>
                    {s.received_at ? new Date(s.received_at).toLocaleString() : '\u2014'}
                  </td>
                  <td style={{ color: 'var(--gold)', fontWeight: 600 }}>{s.asset || '\u2014'}</td>
                  <td style={{ color: parseFloat(s.signal_strength) >= 50 ? 'var(--green)' : 'var(--text-secondary)' }}>
                    {parseFloat(s.signal_strength || 0).toFixed(1)}%
                  </td>
                  <td>{buy ? parseFloat(buy.multiplier).toFixed(1) + '\u00D7' : '\u2014'}</td>
                  <td style={{ fontWeight: 600, color: buy ? 'var(--green)' : 'var(--text-muted)' }}>
                    {buy ? '$' + (parseFloat(buy.buy_amount_usd) * budgetScale).toFixed(2) : '\u2014'}
                  </td>
                  <td>
                    <span className={'badge ' + (s.action_taken === 'sent' ? 'badge-sent' : 'badge-skipped')}>
                      {s.action_taken || '\u2014'}
                    </span>
                  </td>
                </tr>
              );
            })}
            {signals.length === 0 && (
              <tr><td colSpan="6" style={{ textAlign: 'center', padding: '2rem', color: 'var(--text-muted)' }}>
                No signals recorded yet
              </td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── Portfolio Tab ──────────────────────────────────────────
function PortfolioTab() {
  const [portfolio, setPortfolio] = useState(null);
  const [buys, setBuys] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    Promise.all([
      apiFetch('/api/portfolio').catch(() => null),
      apiFetch('/api/buys?limit=200').catch(() => []),
    ]).then(([p, b]) => {
      setPortfolio(p);
      const buyList = Array.isArray(b) ? b : (b?.buys || b?.data || []);
      setBuys(buyList);
      setLoading(false);
    });
  }, []);

  useEffect(() => {
    if (!buys.length) return;
    const sorted = [...buys].sort((a, b) => new Date(a.bought_at) - new Date(b.bought_at));
    let cumulative = 0;
    const dataPoints = sorted.map(b => {
      cumulative += parseFloat(b.buy_amount_usd || 0);
      return { x: b.bought_at, y: cumulative };
    });

    renderChart('portfolio-chart', {
      type: 'line',
      data: {
        labels: dataPoints.map(d => new Date(d.x).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })),
        datasets: [{
          label: 'Cumulative Invested ($)',
          data: dataPoints.map(d => d.y),
          borderColor: '#d4a843', backgroundColor: 'rgba(212,168,67,0.08)',
          fill: true, tension: 0.3, pointRadius: 1, pointHoverRadius: 5, borderWidth: 2,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1a0f2e', borderColor: '#2a1a4a', borderWidth: 1, titleColor: '#d4a843', bodyColor: '#e8e0f0', padding: 12, cornerRadius: 8, titleFont: { size: 13 }, bodyFont: { size: 13 } } },
        scales: {
          x: { ticks: { color: '#6d5e8a', font: { size: 11 }, maxRotation: 45 }, grid: { color: 'rgba(42,26,74,0.3)' } },
          y: { ticks: { color: '#6d5e8a', font: { size: 11 }, callback: v => '$' + v.toLocaleString() }, grid: { color: 'rgba(42,26,74,0.3)' } }
        }
      }
    });
    return () => destroyChart('portfolio-chart');
  }, [buys]);

  if (loading) return <div className="loading"><div className="spinner"/><span>Loading portfolio...</span></div>;

  const assets = portfolio?.assets || portfolio?.data || portfolio || {};
  const assetList = Array.isArray(assets) ? assets : Object.values(assets);
  const totalInvested = assetList.reduce((s, a) => s + parseFloat(a.total_invested_usd || a.total_invested || 0), 0);
  const totalBuys = assetList.reduce((s, a) => s + parseInt(a.total_buys || 0), 0);
  const assetCount = assetList.length || 14;

  return (
    <div>
      <div className="stats-grid">
        <StatCard title="Total Invested" value={`$${totalInvested.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`} label="Across all assets" />
        <StatCard title="Total Buys" value={totalBuys} color="var(--green)" label="Buy signals executed" />
        <StatCard title="Active Assets" value={assetCount} color="var(--purple)" label="Tracked by Accumulator" />
        <StatCard title="Avg Per Buy" value={totalBuys > 0 ? `$${(totalInvested / totalBuys).toFixed(2)}` : '\u2014'} color="var(--blue)" label="Mean DCA amount" />
      </div>

      {buys.length > 0 && (
        <div className="chart-container">
          <div className="card-title" style={{ marginBottom: '1rem' }}>Cumulative Investment</div>
          <div style={{ height: '280px' }}>
            <canvas id="portfolio-chart"></canvas>
          </div>
        </div>
      )}

      <div className="card" style={{ overflowX: 'auto' }}>
        <div className="card-title" style={{ marginBottom: '1rem' }}>Recent Buys</div>
        <table className="signal-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Asset</th>
              <th>Amount</th>
              <th>Multiplier</th>
              <th>Strength</th>
            </tr>
          </thead>
          <tbody>
            {buys.slice(0, 30).map((b, i) => (
              <tr key={i}>
                <td>{b.bought_at ? new Date(b.bought_at).toLocaleDateString() : '\u2014'}</td>
                <td style={{ color: 'var(--gold)', fontWeight: 600 }}>{b.asset || b.ticker}</td>
                <td>${parseFloat(b.buy_amount_usd || 0).toFixed(2)}</td>
                <td>{b.multiplier ? `${parseFloat(b.multiplier).toFixed(1)}\u00D7` : '\u2014'}</td>
                <td>{b.signal_strength ? parseFloat(b.signal_strength).toFixed(2) : '\u2014'}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── Performance Tracker Tab (REDESIGNED with Metrics) ───────
function PerformanceTab() {
  const [data, setData] = useState(null);
  const [buys, setBuys] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    function fetchData() {
      Promise.all([
        apiFetch('/api/portfolio_value').catch(() => null),
        apiFetch('/api/buys?limit=200').catch(() => []),
      ]).then(([pv, b]) => {
        setData(pv);
        setBuys(Array.isArray(b) ? b : (b?.buys || b?.data || []));
        setLoading(false);
      });
    }
    fetchData();
    const interval = setInterval(fetchData, 180000);
    return () => clearInterval(interval);
  }, []);

  useEffect(() => {
    if (!data || !data.equity_curve || !data.equity_curve.length) return;
    if (!buys.length) return;

    const sorted = [...buys].sort((a, b) => new Date(a.bought_at) - new Date(b.bought_at));
    const labels = sorted.map(b => new Date(b.bought_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));
    const curve = data.equity_curve;

    renderChart('performance-chart', {
      type: 'line',
      data: {
        labels: labels.slice(0, curve.length),
        datasets: [
          { label: 'Portfolio Value ($)', data: curve.map(d => d.value), borderColor: '#4ade80', backgroundColor: 'rgba(74,222,128,0.06)', fill: true, tension: 0.3, pointRadius: 0, pointHoverRadius: 5, borderWidth: 2.5 },
          { label: 'Cost Basis ($)', data: curve.map(d => d.invested), borderColor: '#d4a843', backgroundColor: 'rgba(212,168,67,0.06)', fill: true, tension: 0.3, pointRadius: 0, pointHoverRadius: 5, borderWidth: 2, borderDash: [6, 3] },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1a0f2e', borderColor: '#2a1a4a', borderWidth: 1, titleColor: '#d4a843', bodyColor: '#e8e0f0', padding: 14, cornerRadius: 10, titleFont: { size: 13, weight: '600' }, bodyFont: { size: 13 }, callbacks: { label: function(ctx) { return ctx.dataset.label + ': $' + ctx.parsed.y.toLocaleString(); } } } },

          x: { ticks: { color: '#6d5e8a', font: { size: 11 }, maxRotation: 45 }, grid: { display: false } },

        }
      }
    });
    return () => destroyChart('performance-chart');
  }, [data, buys]);

  if (loading) return <div className="loading"><div className="spinner"/><span>Fetching live prices...</span></div>;

  const totalInvested = data?.total_invested || 0;
  const totalValue = data?.total_value || 0;
  const pnl = data?.total_pnl_usd || 0;
  const pnlPct = data?.total_pnl_pct || 0;
  const assets = data?.assets || [];
  const prices = data?.prices || {};
  const metrics = data?.metrics || {};

  // Monthly breakdown from buys
  const byMonth = {};
  buys.forEach(b => {
    const m = (b.bought_at || '').slice(0, 7);
    if (m) byMonth[m] = (byMonth[m] || 0) + parseFloat(b.buy_amount_usd || 0);
  });

  return (
    <div>
      {/* ── Top-Level Summary ── */}
      <div className="stats-grid">
        <StatCard title="Total Invested" value={'$' + totalInvested.toLocaleString(undefined, {maximumFractionDigits: 0})} label="Cost basis" />
        <StatCard title="Portfolio Value" value={'$' + totalValue.toLocaleString(undefined, {maximumFractionDigits: 0})} color={totalValue >= totalInvested ? 'var(--green)' : 'var(--red)'} label="Live prices" />
        <StatCard title="Unrealized P&L" value={(pnl >= 0 ? '+$' : '-$') + Math.abs(pnl).toLocaleString(undefined, {maximumFractionDigits: 0})} color={pnl >= 0 ? 'var(--green)' : 'var(--red)'} label={(pnlPct >= 0 ? '+' : '') + pnlPct.toFixed(1) + '%'} />
      </div>

      {/* ── Key Metrics Row ── */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, minmax(0, 1fr))', gap: '1rem', marginBottom: '1.75rem' }}>
        <div className="metric-card">
          <div className="metric-header">
            <span className="metric-label">Profit Factor</span>
            <InfoButton text="How much you make for every dollar you lose. Above 1.0 means profitable. Above 2.0 is strong. Calculated from per-asset gains vs losses." />
          </div>
          <div className="metric-value" style={{ color: (metrics.profit_factor || 0) >= 1 ? 'var(--green)' : 'var(--red)' }}>
            {metrics.profit_factor != null ? metrics.profit_factor.toFixed(2) : '\u2014'}
          </div>
          <div className="metric-sub">{(metrics.profit_factor || 0) >= 2 ? 'Strong' : (metrics.profit_factor || 0) >= 1 ? 'Profitable' : 'Needs work'}</div>
        </div>

        <div className="metric-card">
          <div className="metric-header">
            <span className="metric-label">Sharpe Ratio</span>
            <InfoButton text="Return per unit of risk taken. Under 1 is okay, 1\u20132 is good, above 2 is excellent. Tells you if the gains are worth the volatility." />
          </div>
          <div className="metric-value" style={{ color: (metrics.sharpe_ratio || 0) >= 1 ? 'var(--green)' : 'var(--gold)' }}>
            {metrics.sharpe_ratio != null ? metrics.sharpe_ratio.toFixed(2) : '\u2014'}
          </div>
          <div className="metric-sub">{(metrics.sharpe_ratio || 0) >= 2 ? 'Excellent' : (metrics.sharpe_ratio || 0) >= 1 ? 'Good' : 'Moderate'}</div>
        </div>

        <div className="metric-card">
          <div className="metric-header">
            <span className="metric-label">Sortino Ratio</span>
            <InfoButton text="Like Sharpe, but only counts bad volatility (drops). Higher is better. Big wins don\u2019t get penalized \u2014 only losses count against you." />
          </div>
          <div className="metric-value" style={{ color: (metrics.sortino_ratio || 0) >= 1 ? 'var(--green)' : 'var(--gold)' }}>
            {metrics.sortino_ratio != null ? metrics.sortino_ratio.toFixed(2) : '\u2014'}
          </div>
          <div className="metric-sub">{(metrics.sortino_ratio || 0) >= 2 ? 'Excellent' : (metrics.sortino_ratio || 0) >= 1 ? 'Good' : 'Moderate'}</div>
        </div>

        <div className="metric-card">
          <div className="metric-header">
            <span className="metric-label">CAGR</span>
            <InfoButton text="Compound Annual Growth Rate. Your smoothed yearly return as if the portfolio grew at a steady pace. The single number that answers: how fast is it growing?" />
          </div>
          <div className="metric-value" style={{ color: (metrics.cagr_pct || 0) >= 0 ? 'var(--green)' : 'var(--red)' }}>
            {metrics.cagr_pct != null ? (metrics.cagr_pct >= 0 ? '+' : '') + metrics.cagr_pct.toFixed(1) + '%' : '\u2014'}
          </div>
          <div className="metric-sub">Annualized</div>
        </div>
      </div>

      {/* ── Price Ticker Bar ── */}
      {Object.keys(prices).length > 0 && (
        <div className="card" style={{ padding: '1rem 1.5rem', marginBottom: '0', borderBottomLeftRadius: 0, borderBottomRightRadius: 0, borderBottom: 'none', overflow: 'hidden' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', marginBottom: '0.75rem' }}>
            <span style={{ fontSize: '0.78rem', color: 'var(--green)', fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase' }}>{'\u25CF'} Live Prices</span>
            <span style={{ fontSize: '0.72rem', color: 'var(--text-muted)' }}>(3-min cache)</span>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '0.6rem 1rem' }}>
            {Object.entries(prices).sort((a,b) => a[0].localeCompare(b[0])).map(([ticker, price]) => {
              const isCrypto = ticker === 'BTC' || ticker === 'SOL';
              const assetData = assets.find(a => a.asset === ticker);
              const pnlPctA = assetData?.pnl_pct || 0;
              return (
                <div key={ticker} style={{ display: 'flex', flexDirection: 'column', padding: '0.35rem 0' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>

                    {assetData && (
                      <span style={{ fontSize: '0.78rem', color: pnlPctA >= 0 ? 'var(--green)' : '#ef4444', fontWeight: 600 }}>
                        {pnlPctA >= 0 ? '\u25B2' : '\u25BC'}{Math.abs(pnlPctA).toFixed(1)}%
                      </span>
                    )}
                  </div>
                  <span style={{ color: 'var(--text-primary)', fontSize: '0.92rem', fontWeight: 500 }}>
                    {'$' + (isCrypto ? price.toLocaleString(undefined, {maximumFractionDigits: 0}) : price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}))}
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── Per-Asset Performance (ticker-style grid, directly below price ticker) ── */}
      {assets.length > 0 && (
        <div className="card" style={{ padding: '1rem 1.5rem', marginBottom: '1.75rem', borderTopLeftRadius: Object.keys(prices).length > 0 ? 0 : 12, borderTopRightRadius: Object.keys(prices).length > 0 ? 0 : 12, borderTop: Object.keys(prices).length > 0 ? '1px solid var(--border)' : undefined, overflow: 'hidden' }}>
          <div className="card-title" style={{ marginBottom: '0.75rem' }}>Per-Asset Performance</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '0.6rem 1rem' }}>
            {assets.map(a => {
              const pnlColor = a.pnl_pct >= 0 ? 'var(--green)' : 'var(--red)';
              const isCrypto = a.asset === 'BTC' || a.asset === 'SOL';
              return (
                <div key={a.asset} style={{ padding: '0.5rem 0', borderBottom: '1px solid rgba(42,26,74,0.35)' }}>

            </div>
            <span style={{ color: 'var(--gold)', fontSize: '0.92rem', fontWeight: 600, minWidth: '4.5rem', textAlign: 'right' }}>${amt.toLocaleString(undefined, {maximumFractionDigits: 0})}</span>
          </div>
        ))}

      </div>

      {/* Disclaimer */}
      <div style={{ padding: '1rem 1.25rem', background: 'var(--bg-card)', border: '1px solid var(--border)', borderRadius: '10px', fontSize: '0.8rem', color: 'var(--text-muted)', lineHeight: 1.6 }}>
        Metrics calculated from live signal data. Sharpe and Sortino use 4.5% risk-free rate (US T-bill). CAGR annualized from inception. Past performance does not guarantee future results.
      </div>
    </div>
  );
}

// ─── Signal Calendar/Heatmap Tab ─────────────────────────────
function CalendarTab() {
  const [signals, setSignals] = useState([]);
  const [loading, setLoading] = useState(true);
  const [viewYear, setViewYear] = useState(new Date().getFullYear());
  const [viewMonth, setViewMonth] = useState(new Date().getMonth());
  const [hoveredCell, setHoveredCell] = useState(null);

  useEffect(() => {
    apiFetch('/api/signals?limit=200')
      .then(data => { setSignals(Array.isArray(data) ? data : (data?.signals || data?.data || [])); })
      .catch(() => setSignals([]))
      .finally(() => setLoading(false));
  }, []);

  const prevMonth = () => { if (viewMonth === 0) { setViewMonth(11); setViewYear(y => y - 1); } else setViewMonth(m => m - 1); };
  const nextMonth = () => { if (viewMonth === 11) { setViewMonth(0); setViewYear(y => y + 1); } else setViewMonth(m => m + 1); };

  const monthLabel = new Date(viewYear, viewMonth).toLocaleString('en-US', { month: 'long', year: 'numeric' }).toUpperCase();

  const calCells = useMemo(() => {
    const firstDay = new Date(viewYear, viewMonth, 1);
    const lastDay = new Date(viewYear, viewMonth + 1, 0);
    const cells = [];
    for (let i = 0; i < firstDay.getDay(); i++) cells.push(null);
    for (let d = 1; d <= lastDay.getDate(); d++) {
      const dateStr = viewYear + '-' + String(viewMonth + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
      const daySignals = signals.filter(s => (s.received_at || '').slice(0, 10) === dateStr);
      const sent = daySignals.filter(s => s.action_taken === 'sent');
      const totalStrength = sent.reduce((sum, s) => sum + parseFloat(s.signal_strength || 0), 0);
      cells.push({ day: d, date: dateStr, signals: daySignals, sent, count: sent.length, totalStrength });
    }
    return cells;
  }, [signals, viewYear, viewMonth]);

  const monthSignals = calCells.filter(c => c && c.count > 0);
  const monthSentCount = monthSignals.reduce((s, c) => s + c.count, 0);
  const monthTotalStrength = monthSignals.reduce((s, c) => s + c.totalStrength, 0);
  const maxStrength = Math.max(...calCells.filter(Boolean).map(c => c.totalStrength), 1);

  function cellBg(cell) {
    if (!cell || cell.count === 0) return 'transparent';
    const intensity = Math.min(1, cell.totalStrength / maxStrength);
    return 'rgba(74,222,128,' + (0.12 + intensity * 0.55) + ')';
  }

  if (loading) return <div className="loading"><div className="spinner"/><span>Loading signal data...</span></div>;

  return (
    <div>
      <div className="stats-grid">
        <StatCard title="Month Signals" value={monthSentCount} color="var(--purple)" label="Buy signals sent" />
        <StatCard title="Active Days" value={monthSignals.length} color="var(--green)" label="Days with signals" />
        <StatCard title="Avg Strength" value={monthSentCount > 0 ? (monthTotalStrength / monthSentCount).toFixed(2) : '\u2014'} color="var(--gold)" label="Mean signal strength" />
      </div>

      <div className="card">
        <div className="cal-nav">
          <button className="cal-nav-btn" onClick={prevMonth}>{'\u25C0'}</button>
          <span className="cal-month-label">{monthLabel}</span>
          <button className="cal-nav-btn" onClick={nextMonth}>{'\u25B6'}</button>
        </div>

        <div className="cal-grid" style={{ marginBottom: '4px' }}>
          {['SUN','MON','TUE','WED','THU','FRI','SAT'].map(d => <div key={d} className="cal-header">{d}</div>)}
        </div>

        <div className="cal-grid">
          {calCells.map((cell, i) => (
            <div key={i} className={'cal-cell' + (cell && cell.count > 0 ? ' has-signals' : '')}
              style={{ background: cell ? cellBg(cell) : 'transparent' }}
              onMouseEnter={() => cell && cell.count > 0 && setHoveredCell(cell)}
              onMouseLeave={() => setHoveredCell(null)}>
              {cell && (
                <React.Fragment>
                  <span className={'cal-day' + (cell.count > 0 ? ' active' : '')} style={{ color: cell.count > 0 ? 'var(--text-primary)' : 'var(--text-muted)' }}>{cell.day}</span>
                  {cell.count > 0 && (
                    <div className="cal-dots">
                      {Array.from({ length: Math.min(cell.count, 4) }, (_, j) => <div key={j} className="cal-dot" />)}
                      {cell.count > 4 && <span style={{ color: 'var(--green)', fontSize: '0.55rem' }}>+</span>}
                    </div>
                  )}
                </React.Fragment>
              )}
            </div>
          ))}
        </div>

        {hoveredCell && hoveredCell.count > 0 && (
          <div style={{ marginTop: '1rem', padding: '1.15rem', background: 'var(--bg-panel)', border: '1px solid var(--border)', borderRadius: '10px' }}>
            <div style={{ color: 'var(--gold)', fontWeight: 700, fontSize: '0.92rem', marginBottom: '0.6rem' }}>
              {hoveredCell.date} {'\u2014'} {hoveredCell.count} signal{hoveredCell.count > 1 ? 's' : ''}
            </div>
            {hoveredCell.sent.map((s, i) => (
              <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '5px 0', borderBottom: i < hoveredCell.sent.length - 1 ? '1px solid var(--border)' : 'none' }}>
                <span style={{ color: 'var(--gold)', fontWeight: 600, fontSize: '0.88rem' }}>{s.asset || s.ticker}</span>
                <span style={{ color: 'var(--text-secondary)', fontSize: '0.85rem' }}>
                  {parseFloat(s.signal_strength || 0).toFixed(2)} {'\u00B7'} {s.multiplier ? parseFloat(s.multiplier).toFixed(1) + '\u00D7' : ''}
                </span>
              </div>
            ))}
          </div>
        )}

        <div style={{ display: 'flex', gap: '1rem', marginTop: '1rem', justifyContent: 'center' }}>
          {[{l:'No activity',b:'transparent'},{l:'Light',b:'rgba(74,222,128,0.18)'},{l:'Medium',b:'rgba(74,222,128,0.42)'},{l:'Heavy',b:'rgba(74,222,128,0.67)'}].map(x => (
            <div key={x.l} style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
              <div style={{ width: '16px', height: '16px', borderRadius: '4px', background: x.b, border: '1px solid var(--border)' }} />
              <span style={{ color: 'var(--text-muted)', fontSize: '0.78rem' }}>{x.l}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}
